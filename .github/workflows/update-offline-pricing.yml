name: Update offline pricing data
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: update-offline-pricing
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Update offline pricing dataset
        run: pnpm pricing:update
      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh auth setup-git

          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          BRANCH="automation/update-offline-pricing"
          TITLE="Update offline pricing data"
          BODY_FILE="$(mktemp)"

          cat > "$BODY_FILE" << 'EOF'
          Summary

          Refresh the checked-in offline pricing datasets from LiteLLM.

          Changes
          - Update `assets/claude_pricing.json`.
          - Update `assets/codex_pricing.json`.
          - Regenerate the offline pricing assets via `pnpm pricing:update`.

          Why

          Keeping the checked-in pricing assets current preserves offline cost lookup accuracy as upstream model pricing changes.

          Notes

          - This PR is generated automatically by `.github/workflows/update-offline-pricing.yml`.
          - The workflow opens or updates a PR only when the filtered LiteLLM datasets change.

          Testing

          - `pnpm pricing:update`
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$BRANCH"
          git add assets/claude_pricing.json assets/codex_pricing.json
          git commit -m "$TITLE"
          git push -f origin "$BRANCH"

          PR_NUMBER="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')"
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            gh pr edit "$PR_NUMBER" --title "$TITLE" --body-file "$BODY_FILE"
          else
            gh pr create \
              --title "$TITLE" \
              --body-file "$BODY_FILE" \
              --base main \
              --head "$BRANCH" \
              --reviewer "mkusaka"

            PR_NUMBER="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')"
          fi

          gh pr merge "$PR_NUMBER" --auto --merge
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 60
