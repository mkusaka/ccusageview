name: Update offline pricing data

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-offline-pricing
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Update offline pricing dataset
        run: pnpm pricing:update

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          BRANCH="automation/update-offline-pricing"
          TITLE="Update offline pricing data"
          BODY_FILE="$(mktemp)"

          cat > "$BODY_FILE" << 'EOF'
          Summary

          Refresh the checked-in offline pricing datasets from LiteLLM.

          Changes
          - Update `assets/claude_pricing.json`.
          - Update `assets/codex_pricing.json`.
          - Regenerate the offline pricing assets via `pnpm pricing:update`.

          Why

          Keeping the checked-in pricing assets current preserves offline cost lookup accuracy as upstream model pricing changes.

          Notes

          - This PR is generated automatically by `.github/workflows/update-offline-pricing.yml`.
          - The workflow opens or updates a PR only when the filtered LiteLLM datasets change.

          Testing

          - `pnpm pricing:update`
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$BRANCH"
          git add assets/claude_pricing.json assets/codex_pricing.json
          git commit -m "$TITLE"
          git push -f origin "$BRANCH"

          PR_NUMBER="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')"
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            gh pr edit "$PR_NUMBER" --title "$TITLE" --body-file "$BODY_FILE"
          else
            gh pr create \
              --title "$TITLE" \
              --body-file "$BODY_FILE" \
              --base main \
              --head "$BRANCH" \
              --reviewer "mkusaka"
          fi
